interface:
  display_name: "One Shot Production Ready"
  short_description: "Autonomously make an existing app production-ready with two-user auth, CRUD, dashboard, DB, deployment, and same-layer proof."
  default_prompt: "Use $one-shot-production-ready-skill when the user asks to make an app production-ready, execute autonomously, verify all functionality, test multiple accounts, fix CRUD/dashboard persistence, or prove database-backed user isolation. Start by recovering the likely full finish line from the current thread plus recent relevant Codex/Claude/session evidence when the request sounds like a continuation, false-finish cleanup, or 'make it actually complete' pass. Read repo/source/history truth, project instructions, and AGENTS_positions.md, then use related owner skills as ingredients instead of creating duplicate workflows. Inventory auth, routes, forms, dashboard, CRUD, DB/env, roles/tenants, loading/error/success states, deploy path, and live user-visible surfaces. Implement within the existing architecture, avoid demo/fake/local-only fallbacks, test at least two users, prove CRUD persistence and isolation after refresh/relogin, query the intended database when available, commit/push, deploy if normal for the repo, and verify the final live/user-visible surface. Do not downgrade to code review plus commit because one runtime tool failed; try alternate proof routes and close as CHECKPOINT if any promised production-readiness layer remains unproven."
